<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📊 Progress Tracker — RPL AI Curriculum</title>
<style>
  :root {
    --bg: #0f0f1a;
    --card: #1a1a2e;
    --accent: #6366f1;
    --accent2: #818cf8;
    --green: #22c55e;
    --yellow: #eab308;
    --red: #ef4444;
    --text: #e2e8f0;
    --text2: #94a3b8;
    --border: #1e293b;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 2rem;
    max-width: 1200px;
    margin: 0 auto;
  }
  h1 { font-size: 1.8rem; margin-bottom: 0.5rem; display: flex; align-items: center; gap: 0.75rem; }
  h1 small { font-size: 0.9rem; color: var(--text2); font-weight: 400; }
  .subtitle { color: var(--text2); margin-bottom: 2rem; font-size: 0.95rem; }
  
  .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
  .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 1.2rem; text-align: center; }
  .stat-card .num { font-size: 2rem; font-weight: 700; }
  .stat-card .label { font-size: 0.85rem; color: var(--text2); margin-top: 0.25rem; }
  .stat-card.total .num { color: var(--accent); }
  .stat-card.done .num { color: var(--green); }
  .stat-card.left .num { color: var(--yellow); }
  
  .filters { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1.5rem; }
  .filters button {
    background: var(--card); border: 1px solid var(--border); color: var(--text2);
    padding: 0.4rem 1rem; border-radius: 8px; cursor: pointer; font-size: 0.85rem;
    transition: all 0.2s;
  }
  .filters button:hover { border-color: var(--accent); color: var(--text); }
  .filters button.active { background: var(--accent); color: white; border-color: var(--accent); }
  .search-bar { margin-bottom: 1.5rem; }
  .search-bar input {
    width: 100%; padding: 0.75rem 1rem; border-radius: 8px; border: 1px solid var(--border);
    background: var(--card); color: var(--text); font-size: 0.95rem;
  }
  .search-bar input:focus { outline: none; border-color: var(--accent); }
  
  .module { 
    background: var(--card); border: 1px solid var(--border); border-radius: 12px;
    padding: 1rem 1.2rem; margin-bottom: 0.5rem; cursor: pointer;
    transition: all 0.2s; display: flex; align-items: center; gap: 1rem;
  }
  .module:hover { border-color: var(--accent2); }
  .module .num { 
    width: 2.2rem; height: 2.2rem; border-radius: 8px; display: flex; align-items: center;
    justify-content: center; font-weight: 700; font-size: 0.85rem; flex-shrink: 0;
  }
  .module.beg .num { background: #1a3a1a; color: var(--green); }
  .module.int .num { background: #1a2a3a; color: var(--accent); }
  .module.adv .num { background: #3a1a1a; color: var(--red); }
  .module .info { flex: 1; }
  .module .name { font-weight: 600; font-size: 0.95rem; }
  .module .meta { color: var(--text2); font-size: 0.8rem; margin-top: 0.2rem; }
  .module .status {
    padding: 0.3rem 0.8rem; border-radius: 6px; font-size: 0.75rem;
    font-weight: 600; white-space: nowrap; flex-shrink: 0;
  }
  .module .status.selesai { background: rgba(34,197,94,0.15); color: var(--green); }
  .module .status.progress { background: rgba(234,179,8,0.15); color: var(--yellow); }
  .module .status.baru { background: rgba(99,102,241,0.15); color: var(--accent2); }
  .module .bar {
    width: 80px; height: 6px; background: #1e293b; border-radius: 3px;
    overflow: hidden; flex-shrink: 0;
  }
  .module .bar .fill { height: 100%; border-radius: 3px; transition: width 0.3s; }
  
  .footer { margin-top: 2rem; text-align: center; color: var(--text2); font-size: 0.8rem; }
  .footer button { background: var(--card); border: 1px solid var(--border); color: var(--text2); padding: 0.4rem 1rem; border-radius: 8px; cursor: pointer; margin: 0 0.25rem; }
  .footer button:hover { border-color: var(--red); color: var(--red); }
</style>
</head>
<body>

<h1>📊 Progress Tracker <small>RPL AI Curriculum</small></h1>
<p class="subtitle">Track completion tiap modul. Data disimpan otomatis di browser (localStorage).</p>

<div class="stats-grid">
  <div class="stat-card total"><div class="num" id="totalCount">57</div><div class="label">Total Modul</div></div>
  <div class="stat-card done"><div class="num" id="doneCount">0</div><div class="label">✅ Selesai</div></div>
  <div class="stat-card left"><div class="num" id="leftCount">57</div><div class="label">⏳ Sisa</div></div>
</div>

<div class="search-bar">
  <input type="text" id="search" placeholder="🔍 Cari modul..." oninput="render()">
</div>

<div class="filters" id="filters">
  <button class="active" data-filter="all" onclick="setFilter('all')">Semua</button>
  <button data-filter="selesai" onclick="setFilter('selesai')">✅ Selesai</button>
  <button data-filter="progress" onclick="setFilter('progress')">🔄 Dipelajari</button>
  <button data-filter="baru" onclick="setFilter('baru')">📌 Baru</button>
  <button data-filter="beg" onclick="setFilter('beg')">🌱 Beginner</button>
  <button data-filter="int" onclick="setFilter('int')">📐 Intermediate</button>
  <button data-filter="adv" onclick="setFilter('adv')">🚀 Advanced</button>
</div>

<div id="moduleList"></div>

<div class="footer">
  <button onclick="resetProgress()">↺ Reset Semua</button>
  <span id="lastSaved"></span>
</div>

<script>
const MODULES = [
  { id:'00', name:'Fundamental Pemrograman & Web',           level:'beg', category:'00 Fundamentals' },
  { id:'01', name:'JavaScript Fundamentals',                 level:'beg', category:'01 Bahasa Pemrograman' },
  { id:'02', name:'Algorithms & Data Structures',            level:'beg', category:'01 Bahasa Pemrograman' },
  { id:'03', name:'TypeScript Basics',                       level:'beg', category:'01 Bahasa Pemrograman' },
  { id:'04', name:'Web Basics',                              level:'beg', category:'02 Frontend' },
  { id:'05', name:'Git & Deploy',                            level:'beg', category:'03 Tools & Workflow' },
  { id:'06', name:'Node.js & Express',                       level:'int', category:'04 Backend' },
  { id:'07', name:'Mastra AI',                               level:'int', category:'05 AI Engineering' },
  { id:'08', name:'Final Project',                           level:'adv', category:'06 Project' },
  { id:'09', name:'Testing',                                 level:'adv', category:'03 Tools & Workflow' },
  { id:'10', name:'Design Patterns',                         level:'int', category:'04 Backend' },
  { id:'11', name:'System Design',                           level:'int', category:'04 Backend' },
  { id:'12', name:'UI/UX Design',                            level:'int', category:'02 Frontend' },
  { id:'13', name:'Flutter Mobile',                          level:'int', category:'02 Frontend' },
  { id:'14', name:'Cybersecurity',                           level:'int', category:'03 Tools & Workflow' },
  { id:'15', name:'Agile & Scrum',                           level:'int', category:'03 Tools & Workflow' },
  { id:'16', name:'Realtime Apps',                           level:'int', category:'04 Backend' },
  { id:'17', name:'Advanced Database',                       level:'int', category:'04 Backend' },
  { id:'18', name:'AI Prompt Engineering',                   level:'int', category:'05 AI Engineering' },
  { id:'19', name:'Technical Interview',                     level:'int', category:'06 Project' },
  { id:'20', name:'Frontend Frameworks',                     level:'int', category:'02 Frontend' },
  { id:'21', name:'Docker',                                  level:'int', category:'03 Tools & Workflow' },
  { id:'22', name:'Monorepo',                                level:'int', category:'03 Tools & Workflow' },
  { id:'23', name:'System Runtime & Async',                  level:'int', category:'04 Backend' },
  { id:'24', name:'Resilience Patterns',                     level:'adv', category:'04 Backend' },
  { id:'25', name:'Soft Skills & Professional',              level:'beg', category:'06 Project' },
  { id:'26', name:'Pragmatic Programming',                   level:'beg', category:'03 Tools & Workflow' },
  { id:'27', name:'Linux Terminal',                          level:'beg', category:'03 Tools & Workflow' },
  { id:'28', name:'REST API Design',                         level:'int', category:'04 Backend' },
  { id:'29', name:'Cloud Computing',                         level:'adv', category:'03 Tools & Workflow' },
  { id:'30', name:'GraphQL & tRPC',                          level:'adv', category:'04 Backend' },
  { id:'31', name:'Auth & Identity',                         level:'adv', category:'04 Backend' },
  { id:'32', name:'Performance Optimization',                level:'adv', category:'02 Frontend' },
  { id:'33', name:'Data Visualization',                      level:'int', category:'02 Frontend' },
  { id:'34', name:'PWA & Offline-First',                     level:'adv', category:'02 Frontend' },
  { id:'35', name:'HTML & CSS Dasar',                        level:'beg', category:'02 Frontend' },
  { id:'36', name:'Web Architecture',                        level:'beg', category:'04 Backend' },
  { id:'37', name:'Database Introduction',                   level:'beg', category:'04 Backend' },
  { id:'38', name:'AI-Assisted Dev Workflow',                level:'adv', category:'05 AI Engineering' },
  { id:'39', name:'Payment Integration',                     level:'adv', category:'04 Backend' },
  { id:'40', name:'Background Jobs & Queue',                 level:'adv', category:'04 Backend' },
  { id:'41', name:'Monitoring & Error Tracking',             level:'adv', category:'03 Tools & Workflow' },
  { id:'42', name:'File Upload & Storage',                   level:'int', category:'04 Backend' },
  { id:'43', name:'Search Implementation',                   level:'adv', category:'04 Backend' },
  { id:'44', name:'Digital Portfolio & Branding',            level:'beg', category:'06 Project' },
  { id:'45', name:'Internationalization (i18n)',             level:'adv', category:'02 Frontend' },
  { id:'46', name:'Debugging & DevTools',                    level:'int', category:'03 Tools & Workflow' },
  { id:'47', name:'Team Git Workflow',                       level:'int', category:'03 Tools & Workflow' },
  { id:'48', name:'Portfolio Project Series',                level:'adv', category:'06 Project' },
  { id:'49', name:'Production-Ready Code',                   level:'adv', category:'04 Backend' },
  { id:'50', name:'Microservices Hands-On',                  level:'adv', category:'04 Backend' },
  { id:'51', name:'LKS Competition Prep',                    level:'adv', category:'06 Project' },
  { id:'52', name:'Indonesian Tech Ecosystem',               level:'int', category:'06 Project' },
  { id:'53', name:'AI Coding Agents & Workflow',             level:'adv', category:'05 AI Engineering' },
  { id:'54', name:'Prompt Engineering for Dev',              level:'int', category:'05 AI Engineering' },
  { id:'55', name:'AI Documentation & Spec',                 level:'adv', category:'05 AI Engineering' },
  { id:'56', name:'Advanced AI Workflow',                    level:'adv', category:'05 AI Engineering' },
];

const STATUSES = ['baru', 'progress', 'selesai'];
const STORAGE_KEY = 'rpl-progress';

function loadProgress() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch { return {}; }
}
function saveProgress(p) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(p));
  document.getElementById('lastSaved').textContent = '💾 Tersimpan ' + new Date().toLocaleTimeString();
}

let progress = loadProgress();
let filter = 'all';
let currentStatus = 'progress';

function cycleStatus(id) {
  const p = loadProgress();
  const cur = p[id] || 'baru';
  const idx = STATUSES.indexOf(cur);
  p[id] = STATUSES[(idx + 1) % STATUSES.length];
  saveProgress(p);
  progress = p;
  render();
}

function setFilter(f) {
  filter = f;
  document.querySelectorAll('.filters button').forEach(b => b.classList.toggle('active', b.dataset.filter === f));
  render();
}

function resetProgress() {
  if (!confirm('Reset semua progress?')) return;
  saveProgress({});
  progress = {};
  render();
}

function render() {
  const p = loadProgress();
  progress = p;
  const q = document.getElementById('search').value.toLowerCase();
  
  let modules = MODULES.filter(m => {
    if (filter !== 'all' && m.level !== filter && filter !== 'selesai' && filter !== 'progress' && filter !== 'baru') return false;
    const s = p[m.id] || 'baru';
    if (filter === 'selesai' && s !== 'selesai') return false;
    if (filter === 'progress' && s !== 'progress') return false;
    if (filter === 'baru' && s !== 'baru') return false;
    if (q && !m.name.toLowerCase().includes(q) && !m.id.includes(q)) return false;
    return true;
  });
  
  // stats
  const done = MODULES.filter(m => (p[m.id] || 'baru') === 'selesai').length;
  document.getElementById('doneCount').textContent = done;
  document.getElementById('leftCount').textContent = MODULES.length - done;
  
  // render
  const list = document.getElementById('moduleList');
  list.innerHTML = modules.map(m => {
    const s = p[m.id] || 'baru';
    const pct = { baru: 0, progress: 50, selesai: 100 };
    const colors = { baru: '#6366f1', progress: '#eab308', selesai: '#22c55e' };
    const labels = { baru: '📌 Baru', progress: '🔄 Dipelajari', selesai: '✅ Selesai' };
    const levelLabel = { beg:'🌱 Beginner', int:'📐 Intermediate', adv:'🚀 Advanced' };
    return `<div class="module ${m.level}" onclick="cycleStatus('${m.id}')">
      <div class="num">${m.id}</div>
      <div class="info">
        <div class="name">${m.name}</div>
        <div class="meta">${levelLabel[m.level]} · ${m.category}</div>
      </div>
      <div class="bar"><div class="fill" style="width:${pct[s]}%;background:${colors[s]}"></div></div>
      <div class="status ${s}">${labels[s]}</div>
    </div>`;
  }).join('');
}

render();
</script>
</body>
</html>
