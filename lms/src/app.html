<!doctype html>
<html lang="id">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="text-scale" content="scale" />
		<meta name="description" content="RPL AI Curriculum — Belajar Pengembangan Software Berbasis AI. 57 modul, flashcards, AI tutor, coding exercises." />
		<meta name="theme-color" content="#0f1011" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
		<link rel="icon" type="image/svg+xml" href="/icons/favicon.svg" />
		<link rel="apple-touch-icon" href="/icons/apple-touch-icon.svg" />
		<link rel="manifest" href="/manifest.json" />
		<meta property="og:title" content="RPL AI LMS">
		<meta property="og:description" content="Belajar Pengembangan Software Berbasis AI — RPL AI Curriculum">
		<meta property="og:type" content="website">
		<meta property="og:url" content="https://lms-syllabus.ant-joshua.my.id">
		<meta name="twitter:card" content="summary_large_image">
		<meta name="twitter:title" content="RPL AI LMS">
		<meta name="twitter:description" content="Belajar Pengembangan Software Berbasis AI">
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
		<script>
			// Enhance code blocks globally: wrapper, top bar (lang badge + copy btn with checkmark), line numbers gutter
			function enhanceCodeBlocks() {
				document.querySelectorAll('.markdown-content pre, .text-content.prose pre').forEach(pre => {
					if (pre.hasAttribute('data-enhanced') || pre.querySelector('.copy-btn')) return;
					pre.setAttribute('data-enhanced', 'true');

					const code = pre.querySelector('code');
					if (!code) return;

					// Detect language from class
					const cls = [...code.classList].find(c => c.startsWith('language-'));
					const lang = cls ? cls.replace('language-', '') : '';

					// Wrap pre in a wrapper div
					const wrapper = document.createElement('div');
					wrapper.className = 'code-block-wrapper';
					pre.parentNode.insertBefore(wrapper, pre);
					wrapper.appendChild(pre);

					// Top bar
					const bar = document.createElement('div');
					bar.className = 'code-block-bar';

					// Language badge
					if (lang) {
						const badge = document.createElement('span');
						badge.className = 'code-lang-badge';
						badge.textContent = lang;
						bar.appendChild(badge);
					}

					// Copy button with SVG clipboard icon —> checkmark on copy
					const btn = document.createElement('button');
					btn.className = 'copy-btn';
					btn.innerHTML = '<svg class="copy-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg><svg class="check-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg><span class="copy-text">Copy</span>';
					btn.onclick = async e => {
						e.stopPropagation();
						try {
							await navigator.clipboard.writeText(code.textContent || '');
							btn.classList.add('copied');
							setTimeout(() => btn.classList.remove('copied'), 1500);
						} catch {
							btn.querySelector('.copy-text').textContent = 'Failed';
						}
					};
					bar.appendChild(btn);

					wrapper.insertBefore(bar, pre);

					// Line numbers gutter
					const text = code.textContent || '';
					const lines = text.split('\n');
					// Remove trailing empty line from final newline
					if (lines.length > 1 && lines[lines.length - 1] === '') lines.pop();
					if (lines.length > 1) {
						const gutter = document.createElement('div');
						gutter.className = 'line-numbers-gutter';
						gutter.setAttribute('aria-hidden', 'true');
						let gutterHtml = '';
						for (let i = 1; i <= lines.length; i++) {
							gutterHtml += '<span>' + i + '</span>';
						}
						gutter.innerHTML = gutterHtml;
						pre.insertBefore(gutter, code);
						pre.classList.add('has-line-numbers');
					}
				});
			}
			document.addEventListener('DOMContentLoaded', enhanceCodeBlocks);
			document.addEventListener('sveltekit:navigation-end', enhanceCodeBlocks);
		</script>
	</body>
</html>
