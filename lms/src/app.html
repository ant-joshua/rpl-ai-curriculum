<!doctype html>
<html lang="id">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="text-scale" content="scale" />
		<meta name="description" content="RPL AI Curriculum — Belajar Pengembangan Software Berbasis AI. 57 modul, flashcards, AI tutor, coding exercises." />
		<meta name="theme-color" content="#0f1011" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
		<link rel="icon" type="image/svg+xml" href="/icons/favicon.svg" />
		<link rel="apple-touch-icon" href="/icons/apple-touch-icon.svg" />
		<link rel="manifest" href="/manifest.json" />
		<meta property="og:title" content="RPL AI LMS">
		<meta property="og:description" content="Belajar Pengembangan Software Berbasis AI — RPL AI Curriculum">
		<meta property="og:type" content="website">
		<meta property="og:url" content="https://lms-syllabus.ant-joshua.my.id">
		<meta name="twitter:card" content="summary_large_image">
		<meta name="twitter:title" content="RPL AI LMS">
		<meta name="twitter:description" content="Belajar Pengembangan Software Berbasis AI">
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
		<script>
			// Enhance code blocks globally: lang badge + copy button
			function enhanceCodeBlocks() {
				document.querySelectorAll('.markdown-content pre').forEach(pre => {
					if (pre.querySelector('.copy-btn')) return;
					const code = pre.querySelector('code');
					if (!code) return;
					const cls = [...code.classList].find(c => c.startsWith('language-'));
					if (cls && !pre.hasAttribute('data-lang')) {
						pre.setAttribute('data-lang', cls.replace('language-', ''));
					}
					const btn = document.createElement('button');
					btn.className = 'copy-btn';
					btn.textContent = 'Copy';
					btn.onclick = async e => {
						e.stopPropagation();
						try {
							await navigator.clipboard.writeText(code.textContent || '');
							btn.textContent = '✓ Copied!';
							btn.classList.add('copied');
							setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
						} catch { btn.textContent = 'Failed'; }
					};
					pre.appendChild(btn);
				});
			}
			// Run after DOM ready and after SvelteKit navigation
			document.addEventListener('DOMContentLoaded', enhanceCodeBlocks);
			document.addEventListener('sveltekit:navigation-end', enhanceCodeBlocks);
		</script>
	</body>
</html>
