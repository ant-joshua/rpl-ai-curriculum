<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RPL AI Curriculum</title>
  <meta name="description" content="Kurikulum Rekayasa Perangkat Lunak Era AI untuk SMK — Dari nol sampai deploy AI-powered web app">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🤖</text></svg>">

  <link rel="stylesheet" href="vendor/dark.css" id="docsify-theme">
  <link rel="stylesheet" href="vendor/vue.css" id="docsify-theme-light" disabled>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-primary: #070b14;
      --bg-secondary: #0d1321;
      --bg-card: #141b2d;
      --bg-card-hover: #1a2338;
      --bg-elevated: #1c2640;
      --border: #1e2a45;
      --border-light: #2a3a5c;
      --text-primary: #e8edf5;
      --text-secondary: #94a3b8;
      --text-muted: #5b6e8f;
      --accent: #FF6B35;
      --accent-hover: #ff8a5c;
      --accent-glow: rgba(255, 107, 53, 0.12);
      --accent-subtle: rgba(255, 107, 53, 0.06);
      --blue: #3b82f6;
      --blue-subtle: rgba(59, 130, 246, 0.08);
      --green: #22c55e;
      --green-subtle: rgba(34, 197, 94, 0.08);
      --purple: #a855f7;
      --purple-subtle: rgba(168, 85, 247, 0.08);
      --yellow: #eab308;
      --yellow-subtle: rgba(234, 179, 8, 0.08);
      --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --font-heading: 'Plus Jakarta Sans', 'Inter', -apple-system, sans-serif;
      --mono: 'JetBrains Mono', 'Fira Code', monospace;
      --ease: cubic-bezier(0.4, 0, 0.2, 1);
    }

    html[data-theme="light"] {
      --bg-primary: #f8fafc;
      --bg-secondary: #f1f5f9;
      --bg-card: #ffffff;
      --bg-card-hover: #f1f5f9;
      --bg-elevated: #ffffff;
      --border: #e2e8f0;
      --border-light: #cbd5e1;
      --text-primary: #0f172a;
      --text-secondary: #334155;
      --text-muted: #64748b;
      --accent: #ea580c;
      --accent-hover: #c2410c;
      --accent-glow: rgba(234, 88, 12, 0.1);
      --accent-subtle: rgba(234, 88, 12, 0.05);
    }

    body { background: var(--bg-primary); color: var(--text-primary); font-family: var(--font); }
    .sidebar { background: var(--bg-secondary); }
    .sidebar ul li a { color: var(--text-secondary); }
    .sidebar ul li a:hover { color: var(--accent); }
    .sidebar ul li.active > a { color: var(--accent); }
    .sidebar ul li strong { color: var(--text-primary); }
    .sidebar-toggle { display: flex; }
    .sidebar-toggle span { background: var(--accent); }

    @keyframes spin { to { transform: rotate(360deg); } }
    #app > .loader {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      height: 60vh; gap: 16px; color: var(--text-secondary); font-size: 16px;
    }
    #app > .loader::before {
      content: ''; width: 32px; height: 32px;
      border: 3px solid var(--border); border-top-color: var(--accent);
      border-radius: 50%; animation: spin .8s linear infinite;
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="loader">Memuat...</div>
  </div>

  <button class="sidebar-toggle" id="themeToggle" title="Ganti tema" style="position:fixed;bottom:24px;right:24px;z-index:9999;width:48px;height:48px;border-radius:50%;background:var(--bg-elevated);border:1px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:22px;box-shadow:0 8px 32px rgba(0,0,0,0.35)">🌙</button>

  <script>
    (function(){
      var btn = document.getElementById('themeToggle');
      var html = document.documentElement;
      var darkSheet = document.getElementById('docsify-theme');
      var lightSheet = document.getElementById('docsify-theme-light');
      var isDark = localStorage.getItem('rpl-theme') !== 'light';
      function apply(dark) {
        if(dark) {
          html.removeAttribute('data-theme');
          btn.textContent = '🌙';
          darkSheet.removeAttribute('disabled');
          lightSheet.setAttribute('disabled','disabled');
          localStorage.setItem('rpl-theme','dark');
        } else {
          html.setAttribute('data-theme','light');
          btn.textContent = '☀️';
          darkSheet.setAttribute('disabled','disabled');
          lightSheet.removeAttribute('disabled');
          localStorage.setItem('rpl-theme','light');
        }
      }
      apply(isDark);
      btn.addEventListener('click',function(){
        apply(html.getAttribute('data-theme') !== 'light');
      });
    })();
  </script>

  <script>
    window.$docsify = {
      name: '',
      repo: '',
      loadSidebar: true,
      subMaxLevel: 4,
      alias: {
        '/_sidebar.md': '/_sidebar.md',
        '/:item/_sidebar.md': '/_sidebar.md',
        '/:item/:sub/_sidebar.md': '/_sidebar.md'
      },
      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: 'Cari modul...',
        noData: 'Tidak ditemukan 😅',
        depth: 4
      },
      themeColor: '#FF6B35',
      coverpage: true,
      auto2top: true,
      formatUpdated: '{DD} {MM} {YYYY}',
      plugins: [
        function(hook, vm) {
          hook.afterEach(function(html) {
            return html.replace(/<a href="(?!(?:#|javascript:))/g, '<a target="_blank" href="');
          });
          hook.doneEach(function() {
            document.querySelectorAll('.sidebar li a').forEach(function(a) {
              var text = a.textContent.trim();
              if (text.indexOf('🌱') > -1 && !a.querySelector('.level-badge')) {
                var badge = document.createElement('span');
                badge.className = 'level-badge beg';
                badge.textContent = 'Basic';
                a.appendChild(badge);
              } else if (text.indexOf('📐') > -1 && !a.querySelector('.level-badge')) {
                var badge = document.createElement('span');
                badge.className = 'level-badge int';
                badge.textContent = 'Int';
                a.appendChild(badge);
              } else if (text.indexOf('🚀') > -1 && !a.querySelector('.level-badge')) {
                var badge = document.createElement('span');
                badge.className = 'level-badge adv';
                badge.textContent = 'Adv';
                a.appendChild(badge);
              }
            });
            document.querySelectorAll('.markdown-section pre').forEach(function(pre) {
              var codeEl = pre.querySelector('code');
              if (codeEl && codeEl.className) {
                var lang = codeEl.className.replace(/^lang-/, '');
                if (lang && lang.length < 20) pre.setAttribute('data-lang', lang);
              }
            });
          });
        }
      ]
    };
  </script>

  <script src="vendor/docsify.min.js"></script>
  <script src="vendor/search.min.js"></script>
  <script src="vendor/docsify-copy-code.min.js"></script>
  <script src="vendor/docsify-pagination.min.js"></script>
  <script src="assets/quiz-plugin.js"></script>
</body>
</html>
