<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RPL AI Curriculum</title>
  <meta name="description" content="Kurikulum Rekayasa Perangkat Lunak Era AI untuk SMK">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🤖</text></svg>">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/dark.css">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify-sidebar-collapse@1.3.5/dist/docsify-sidebar-collapse.min.css">
</head>
<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: 'RPL AI Curriculum',
      repo: '',
      loadSidebar: true,
      subMaxLevel: 4,
      sidebarDisplayLevel: 1,
      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: 'Cari...',
        noData: 'Hasil tidak ditemukan',
        depth: 4
      },
      themeColor: '#FF6B35',
      coverpage: true,
      auto2top: true,
      formatUpdated: '{YYYY}-{MM}-{DD}',
      plugins: [
        function(hook, vm) {
          hook.afterEach(function(html) {
            return html.replace(/<a href="http/g, '<a target="_blank" href="http');
          });
        }
      ]
    };
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-sidebar-collapse@1.3.5/dist/docsify-sidebar-collapse.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-copy-code@2/dist/docsify-copy-code.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
  <script>
    mermaid.initialize({
      startOnLoad: true,
      theme: 'dark',
      flowchart: { useMaxWidth: true, htmlLabels: true }
    });
  </script>
  <style>
    :root {
      --docsifytabs-border-color: #4a4a6a;
      --docsifytabs-tab-highlight: #FF6B35;
    }
    .sidebar { background: #0d1117; }
    .sidebar ul li a { color: #c9d1d9; }
    .sidebar ul li a:hover { color: #FF6B35; }
    .markdown-section code { background: #161b22; color: #ffa657; font-size: 14px; }
    .markdown-section pre { background: #161b22; border: 1px solid #30363d; }
    .markdown-section table tr:nth-child(2n) { background: #161b22; }
    .markdown-section blockquote { border-left: 4px solid #FF6B35; color: #8b949e; }
    .cover { background: linear-gradient(135deg, #0d1117 0%, #1a1a2e 50%, #16213e 100%) !important; }
    .anchor span { color: #FF6B35; }
  </style>
</head>
</html>
