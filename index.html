<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RPL AI Curriculum</title>
  <meta name="description" content="Kurikulum Rekayasa Perangkat Lunak Era AI untuk SMK — Dari nol sampai deploy AI-powered web app">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🤖</text></svg>">

  <!-- Docsify Core -->
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/dark.css">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet">

  <style>
    /* ============================================
       ROOT VARIABLES
       ============================================ */
    :root {
      --bg-primary: #070b14;
      --bg-secondary: #0d1321;
      --bg-card: #141b2d;
      --bg-card-hover: #1a2338;
      --bg-elevated: #1c2640;
      --border: #1e2a45;
      --border-light: #2a3a5c;
      --text-primary: #e8edf5;
      --text-secondary: #94a3b8;
      --text-muted: #5b6e8f;
      --accent: #FF6B35;
      --accent-hover: #ff8a5c;
      --accent-glow: rgba(255, 107, 53, 0.12);
      --accent-subtle: rgba(255, 107, 53, 0.06);
      --blue: #3b82f6;
      --blue-subtle: rgba(59, 130, 246, 0.08);
      --green: #22c55e;
      --green-subtle: rgba(34, 197, 94, 0.08);
      --purple: #a855f7;
      --purple-subtle: rgba(168, 85, 247, 0.08);
      --yellow: #eab308;
      --yellow-subtle: rgba(234, 179, 8, 0.08);
      --radius: 12px;
      --radius-sm: 8px;
      --radius-xs: 6px;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.3);
      --shadow: 0 4px 24px rgba(0,0,0,0.35);
      --shadow-lg: 0 8px 40px rgba(0,0,0,0.45);
      --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --font-heading: 'Plus Jakarta Sans', 'Inter', -apple-system, sans-serif;
      --mono: 'JetBrains Mono', 'Fira Code', monospace;
      --ease: cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* ============================================
       GLOBAL
       ============================================ */
    * { box-sizing: border-box; }
    body {
      font-family: var(--font);
      background: var(--bg-primary);
      color: var(--text-primary);
      line-height: 1.75;
      -webkit-font-smoothing: antialiased;
    }
    ::selection { background: var(--accent); color: #fff; }

    /* ============================================
       SIDEBAR
       ============================================ */
    .sidebar {
      background: linear-gradient(180deg, var(--bg-secondary) 0%, var(--bg-primary) 100%) !important;
      border-right: 1px solid var(--border) !important;
      font-family: var(--font);
      width: 300px;
      overflow-y: auto;
    }
    .sidebar::-webkit-scrollbar { width: 4px; }
    .sidebar::-webkit-scrollbar-track { background: transparent; }
    .sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    .sidebar::-webkit-scrollbar-thumb:hover { background: var(--border-light); }

    .sidebar > h1 {
      background: linear-gradient(135deg, var(--bg-secondary) 0%, transparent 100%);
      border-bottom: 1px solid var(--border);
      padding: 20px 20px 16px;
      margin: 0;
    }
    .sidebar > h1 a {
      font-size: 15px;
      font-weight: 700;
      color: var(--accent) !important;
      display: flex;
      align-items: center;
      gap: 10px;
      letter-spacing: -0.2px;
    }
    .sidebar > h1 a:before {
      content: '🤖';
      font-size: 22px;
      filter: drop-shadow(0 2px 8px var(--accent-glow));
    }

    .sidebar ul { padding: 6px 0; }
    .sidebar ul li { margin: 0; }
    .sidebar ul li a {
      color: var(--text-muted) !important;
      font-size: 13px;
      font-weight: 400;
      padding: 7px 20px 7px 24px;
      border-left: 2px solid transparent;
      transition: all 0.2s var(--ease);
      position: relative;
    }
    .sidebar ul li a:hover {
      color: var(--text-secondary) !important;
      background: var(--accent-subtle);
      border-left-color: var(--accent);
    }
    .sidebar ul li.active > a {
      color: var(--accent) !important;
      font-weight: 600;
      border-left-color: var(--accent);
      background: var(--accent-glow);
    }

    /* Level badges inside sidebar */
    .sidebar ul li a .level-badge {
      display: inline-block;
      font-size: 9px;
      font-weight: 700;
      padding: 1px 6px;
      border-radius: 3px;
      margin-left: 6px;
      vertical-align: middle;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }
    .sidebar ul li a .level-badge.beg { background: var(--green-subtle); color: var(--green); }
    .sidebar ul li a .level-badge.int { background: var(--blue-subtle); color: var(--blue); }
    .sidebar ul li a .level-badge.adv { background: var(--purple-subtle); color: var(--purple); }

    .sidebar ul li strong {
      color: var(--text-primary) !important;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      padding: 16px 24px 6px;
      display: block;
      opacity: 0.4;
      font-weight: 600;
    }

    /* ============================================
       COVER / HERO
       ============================================ */
    .cover {
      background: var(--bg-primary) !important;
      position: relative;
      overflow: hidden;
    }
    .cover::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 800px 400px at 20% 30%, rgba(255,107,53,0.08) 0%, transparent 70%),
        radial-gradient(ellipse 600px 600px at 80% 70%, rgba(59,130,246,0.05) 0%, transparent 60%),
        radial-gradient(ellipse 300px 300px at 50% 50%, rgba(168,85,247,0.04) 0%, transparent 50%);
      pointer-events: none;
    }
    /* Grid overlay */
    .cover::after {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
      opacity: 0.5;
    }

    .cover-main {
      position: relative;
      z-index: 2;
      max-width: 900px;
      margin: 0 auto;
      padding: 60px 40px 80px;
    }

    /* Cover hero image banner */
    .cover-main .cover-hero {
      width: 100%;
      max-height: 420px;
      object-fit: cover;
      border-radius: 16px;
      margin-bottom: 40px;
      box-shadow: 0 8px 60px rgba(0,0,0,0.5);
      border: 1px solid var(--border);
      transition: transform 0.4s var(--ease), box-shadow 0.4s var(--ease);
    }
    .cover-main .cover-hero:hover {
      transform: scale(1.005);
      box-shadow: 0 12px 80px rgba(0,0,0,0.6);
    }

    .cover-main h1 {
      font-family: var(--font-heading) !important;
      font-size: 52px !important;
      font-weight: 900 !important;
      color: var(--text-primary) !important;
      margin-bottom: 12px !important;
      letter-spacing: -1.5px;
      line-height: 1.15 !important;
      background: linear-gradient(135deg, var(--accent) 0%, #fbbf24 50%, var(--accent) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .cover-main h1 .anchor span { background: none !important; -webkit-text-fill-color: transparent; }

    .cover-main blockquote {
      border: none !important;
      background: var(--bg-card) !important;
      border-radius: var(--radius) !important;
      padding: 24px 28px !important;
      margin: 24px 0 36px !important;
      border-left: 3px solid var(--accent) !important;
      box-shadow: var(--shadow-sm);
    }
    .cover-main blockquote p {
      font-size: 18px !important;
      color: var(--text-secondary) !important;
      line-height: 1.7;
      margin: 0 !important;
    }
    .cover-main blockquote p:first-child {
      font-size: 15px !important;
      color: var(--accent) !important;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 6px !important;
    }

    .cover-main .cover-buttons {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
      margin: 0 0 32px !important;
    }
    .cover-main .cover-buttons a {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 32px !important;
      border-radius: var(--radius) !important;
      font-weight: 600 !important;
      font-size: 16px !important;
      transition: all 0.3s var(--ease) !important;
      border: 2px solid transparent !important;
    }
    .cover-main .cover-buttons a:first-child {
      background: var(--accent) !important;
      color: #fff !important;
      border-color: var(--accent) !important;
      box-shadow: 0 4px 20px var(--accent-glow);
    }
    .cover-main .cover-buttons a:first-child:hover {
      background: var(--accent-hover) !important;
      transform: translateY(-3px);
      box-shadow: 0 8px 40px rgba(255,107,53,0.3);
    }
    .cover-main .cover-buttons a:last-child {
      background: var(--bg-card) !important;
      color: var(--text-primary) !important;
      border-color: var(--border) !important;
    }
    .cover-main .cover-buttons a:last-child:hover {
      border-color: var(--accent) !important;
      color: var(--accent) !important;
      transform: translateY(-3px);
      box-shadow: 0 8px 30px rgba(0,0,0,0.3);
    }

    .cover-main .cover-badges {
      display: flex;
      gap: 8px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .cover-main .cover-badges img {
      height: 28px;
      border-radius: 6px;
      opacity: 0.6;
      transition: opacity 0.2s, transform 0.2s;
    }
    .cover-main .cover-badges img:hover {
      opacity: 1;
      transform: translateY(-1px);
    }

    /* ============================================
       MAIN CONTENT
       ============================================ */
    .content {
      font-family: var(--font);
    }
    .markdown-section {
      max-width: 960px !important;
      padding: 48px 64px 100px !important;
    }

    .markdown-section h1,
    .markdown-section h2,
    .markdown-section h3,
    .markdown-section h4 {
      font-family: var(--font-heading) !important;
      font-weight: 700 !important;
      color: var(--text-primary) !important;
    }

    .markdown-section h1 {
      font-size: 38px !important;
      font-weight: 800 !important;
      letter-spacing: -0.8px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 16px;
      margin-bottom: 32px;
      line-height: 1.3;
    }

    .markdown-section h2 {
      font-size: 28px !important;
      font-weight: 700 !important;
      margin-top: 48px;
      margin-bottom: 16px;
      letter-spacing: -0.3px;
    }
    .markdown-section h2 a.anchor span {
      color: var(--accent) !important;
    }
    .markdown-section h2::after {
      content: '';
      display: block;
      width: 60px;
      height: 3px;
      background: linear-gradient(90deg, var(--accent), transparent);
      border-radius: 2px;
      margin-top: 8px;
    }

    .markdown-section h3 {
      font-size: 22px !important;
      margin-top: 36px;
      margin-bottom: 12px;
    }

    .markdown-section h4 {
      font-size: 18px !important;
      margin-top: 28px;
    }

    .markdown-section p {
      color: var(--text-secondary);
      font-size: 16px;
      line-height: 1.8;
    }

    .markdown-section a {
      color: var(--accent) !important;
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: border-color 0.2s, color 0.2s;
      font-weight: 500;
    }
    .markdown-section a:hover {
      border-bottom-color: var(--accent);
      color: var(--accent-hover) !important;
    }

    /* ============================================
       IMAGES IN CONTENT
       ============================================ */
    .markdown-section img:not(.emoji):not([height="28"]):not([height="20"]):not(.cover-hero) {
      max-width: 100%;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      transition: transform 0.3s var(--ease), box-shadow 0.3s var(--ease);
      box-shadow: var(--shadow-sm);
    }
    .markdown-section img:not(.emoji):not([height="28"]):not([height="20"]):not(.cover-hero):hover {
      transform: scale(1.005);
      box-shadow: var(--shadow);
    }

    /* ============================================
       LEVEL BADGES
       ============================================ */
    .level-tag {
      display: inline-block;
      font-size: 11px;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 20px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      vertical-align: middle;
    }
    .level-tag.beg { background: var(--green-subtle); color: var(--green); border: 1px solid rgba(34,197,94,0.15); }
    .level-tag.int { background: var(--blue-subtle); color: var(--blue); border: 1px solid rgba(59,130,246,0.15); }
    .level-tag.adv { background: var(--purple-subtle); color: var(--purple); border: 1px solid rgba(168,85,247,0.15); }

    /* ============================================
       CODE BLOCKS
       ============================================ */
    .markdown-section code {
      font-family: var(--mono) !important;
      background: var(--bg-card) !important;
      color: var(--accent) !important;
      font-size: 13px !important;
      padding: 2px 8px;
      border-radius: 4px;
      border: 1px solid var(--border);
    }
    .markdown-section pre {
      background: var(--bg-card) !important;
      border: 1px solid var(--border) !important;
      border-radius: var(--radius) !important;
      padding: 24px !important;
      box-shadow: var(--shadow-sm);
      position: relative;
    }
    .markdown-section pre::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent-glow), transparent);
      opacity: 0.5;
    }
    .markdown-section pre code {
      background: none !important;
      border: none !important;
      padding: 0 !important;
      color: var(--text-primary) !important;
      font-size: 13px !important;
      line-height: 1.7;
    }

    /* Language label on code blocks */
    .markdown-section pre::after {
      content: attr(data-lang);
      position: absolute;
      top: 8px;
      right: 12px;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-muted);
      opacity: 0.5;
      font-weight: 600;
    }

    /* ============================================
       TABLES
       ============================================ */
    .markdown-section table {
      border-collapse: separate;
      border-spacing: 0;
      width: 100%;
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow-sm);
      margin: 24px 0;
    }
    .markdown-section table thead th {
      background: var(--bg-card);
      color: var(--text-muted);
      font-weight: 600;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      padding: 14px 18px;
      border: none;
      border-bottom: 2px solid var(--border);
    }
    .markdown-section table td {
      padding: 12px 18px;
      border: none;
      border-bottom: 1px solid var(--border);
      color: var(--text-secondary);
      font-size: 14px;
    }
    .markdown-section table tr:nth-child(2n) td {
      background: var(--bg-card);
    }
    .markdown-section table tr:hover td {
      background: var(--bg-card-hover);
    }
    .markdown-section table tr:last-child td {
      border-bottom: none;
    }

    /* ============================================
       BLOCKQUOTES
       ============================================ */
    .markdown-section blockquote {
      border-left: none !important;
      background: linear-gradient(135deg, var(--accent-subtle), transparent) !important;
      padding: 20px 24px 20px 28px !important;
      border-radius: var(--radius) !important;
      margin: 24px 0;
      position: relative;
      border: 1px solid rgba(255,107,53,0.1) !important;
    }
    .markdown-section blockquote::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 3px;
      background: linear-gradient(180deg, var(--accent), var(--purple));
      border-radius: 0 2px 2px 0;
    }
    .markdown-section blockquote p {
      color: var(--text-secondary) !important;
      font-size: 15px !important;
    }

    /* ============================================
       MERMAID
       ============================================ */
    .mermaid {
      background: var(--bg-card);
      border-radius: var(--radius);
      padding: 32px;
      margin: 24px 0;
      border: 1px solid var(--border);
      overflow-x: auto;
      text-align: center;
      box-shadow: var(--shadow-sm);
      position: relative;
    }
    .mermaid svg { max-width: 100%; height: auto; }

    /* ============================================
       LISTS
       ============================================ */
    .markdown-section ul { padding-left: 24px; }
    .markdown-section ul li,
    .markdown-section ol li {
      color: var(--text-secondary);
      margin: 6px 0;
      line-height: 1.7;
    }
    .markdown-section ul li::marker { color: var(--accent); }
    .markdown-section ol li::marker { color: var(--accent); font-weight: 600; }

    /* ============================================
       HORIZONTAL RULES
       ============================================ */
    .markdown-section hr {
      border: none;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border-light), transparent);
      margin: 48px 0;
      opacity: 0.5;
    }

    /* ============================================
       SEARCH
       ============================================ */
    .search input {
      background: var(--bg-card) !important;
      border: 1px solid var(--border) !important;
      border-radius: var(--radius-sm) !important;
      color: var(--text-primary) !important;
      font-family: var(--font);
      padding: 10px 16px !important;
      font-size: 14px;
      transition: all 0.2s var(--ease);
    }
    .search input:focus {
      border-color: var(--accent) !important;
      box-shadow: 0 0 0 3px var(--accent-glow);
      outline: none;
    }
    .search input::placeholder { color: var(--text-muted); }
    .search .clear-button { display: none; }

    /* Search results dropdown */
    .search .search-dropdown {
      background: var(--bg-card) !important;
      border: 1px solid var(--border) !important;
      border-radius: var(--radius) !important;
    }
    .search .search-dropdown a {
      color: var(--text-secondary) !important;
      border-left: 2px solid transparent;
      padding: 8px 16px !important;
    }
    .search .search-dropdown a:hover {
      background: var(--accent-subtle) !important;
      border-left-color: var(--accent);
    }
    .search .search-dropdown a.active {
      background: var(--accent-glow) !important;
      color: var(--accent) !important;
      border-left-color: var(--accent);
    }

    /* ============================================
       COPY CODE BUTTON
       ============================================ */
    .docsify-copy-code-button {
      background: var(--bg-elevated) !important;
      color: var(--text-muted) !important;
      border: 1px solid var(--border) !important;
      border-radius: var(--radius-xs) !important;
      font-size: 11px !important;
      font-weight: 500;
      padding: 4px 12px !important;
      transition: all 0.2s var(--ease);
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }
    .docsify-copy-code-button:hover {
      background: var(--accent) !important;
      color: #fff !important;
      border-color: var(--accent) !important;
    }

    /* ============================================
       PAGINATION / NAV
       ============================================ */
    .docsify-pagination-container {
      border-top: 1px solid var(--border) !important;
      margin-top: 60px !important;
      padding-top: 32px !important;
    }
    .pagination-item-label {
      color: var(--text-muted) !important;
      font-size: 12px !important;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .pagination-item-title {
      color: var(--text-primary) !important;
      font-size: 15px !important;
      font-weight: 600;
    }
    .pagination-item:hover .pagination-item-title {
      color: var(--accent) !important;
    }
    .pagination-item:hover .pagination-item-label {
      color: var(--text-secondary) !important;
    }

    /* ============================================
       SIDEBAR TOGGLE (hamburger)
       ============================================ */
    .sidebar-toggle {
      background: var(--bg-secondary) !important;
      padding: 8px !important;
      border-radius: 0 8px 8px 0 !important;
      border: 1px solid var(--border) !important;
      border-left: none !important;
    }
    .sidebar-toggle span { background: var(--accent) !important; }

    /* ============================================
       LOADING
       ============================================ */
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    @keyframes loader-spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .content-loader {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 60vh;
      gap: 20px;
      color: var(--accent);
      font-size: 18px;
      font-weight: 500;
    }
    .content-loader .loader-spinner {
      width: 40px;
      height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: loader-spin 0.8s linear infinite;
    }

    /* ============================================
       FOOTER AREA
       ============================================ */
    .app-footer {
      text-align: center;
      padding: 24px;
      color: var(--text-muted);
      font-size: 13px;
      border-top: 1px solid var(--border);
      margin-top: 40px;
    }
    .app-footer a { color: var(--accent); text-decoration: none; }

    /* ============================================
       RESPONSIVE
       ============================================ */
    @media (max-width: 768px) {
      .sidebar { width: 280px !important; }
      .markdown-section { padding: 24px 20px 60px !important; }
      .markdown-section h1 { font-size: 28px !important; }
      .markdown-section h2 { font-size: 22px !important; }
      .markdown-section h2::after { width: 40px; }
      .cover-main { padding: 24px 16px 48px; }
      .cover-main .cover-hero { max-height: 200px; border-radius: 12px; }
      .cover-main h1 { font-size: 32px !important; }
      .cover-main blockquote p { font-size: 15px !important; }
      .cover-main .cover-buttons { flex-direction: column; align-items: center; }
      .cover-main .cover-buttons a { width: 100%; max-width: 280px; justify-content: center; }
      .markdown-section table { font-size: 13px; }
      .markdown-section pre { padding: 16px !important; }
    }

    @media (max-width: 480px) {
      .cover-main { padding: 16px 12px 32px; }
      .cover-main h1 { font-size: 26px !important; }
      .cover-main .cover-hero { max-height: 160px; }
      .markdown-section { padding: 16px 14px 40px !important; }
    }

    /* ============================================
       SCROLLBAR (main)
       ============================================ */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--border-light); }

    /* ============================================
       PRINT
       ============================================ */
    @media print {
      .sidebar, .sidebar-toggle, .docsify-copy-code-button, .app-nav { display: none !important; }
      .markdown-section { max-width: 100% !important; padding: 20px !important; }
      body { background: #fff !important; color: #111 !important; }
      .markdown-section p { color: #333 !important; }
      .markdown-section code { background: #f5f5f5 !important; color: #d63384 !important; }
      .markdown-section pre { background: #f5f5f5 !important; border-color: #ddd !important; }
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="content-loader">
      <div class="loader-spinner"></div>
      <span>🗺️ Memuat...</span>
    </div>
  </div>

  <script>
    window.$docsify = {
      name: '',
      repo: '',
      loadSidebar: true,
      subMaxLevel: 4,
      sidebarDisplayLevel: 1,
      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: 'Cari modul...',
        noData: 'Tidak ditemukan 😅',
        depth: 4
      },
      themeColor: '#FF6B35',
      coverpage: true,
      auto2top: true,
      formatUpdated: '{DD} {MM} {YYYY}',
      plugins: [
        function(hook, vm) {
          hook.afterEach(function(html) {
            // Open external links in new tab
            html = html.replace(/<a href="(?!(?:#|javascript:))/g, '<a target="_blank" href="');
            // Wrap cover buttons in container
            return html;
          });
          hook.doneEach(function() {
            // Add level badges to sidebar items
            document.querySelectorAll('.sidebar li a').forEach(function(a) {
              var text = a.textContent.trim();
              if (text.indexOf('🌱') > -1 && !a.querySelector('.level-badge')) {
                var badge = document.createElement('span');
                badge.className = 'level-badge beg';
                badge.textContent = 'Basic';
                a.appendChild(badge);
              } else if (text.indexOf('📐') > -1 && !a.querySelector('.level-badge')) {
                var badge = document.createElement('span');
                badge.className = 'level-badge int';
                badge.textContent = 'Int';
                a.appendChild(badge);
              } else if (text.indexOf('🚀') > -1 && !a.querySelector('.level-badge')) {
                var badge = document.createElement('span');
                badge.className = 'level-badge adv';
                badge.textContent = 'Adv';
                a.appendChild(badge);
              }
            });
            // Add data-lang attr to code blocks
            document.querySelectorAll('.markdown-section pre').forEach(function(pre) {
              var codeEl = pre.querySelector('code');
              if (codeEl && codeEl.className) {
                var lang = codeEl.className.replace(/^lang-/, '');
                if (lang && lang.length < 20) pre.setAttribute('data-lang', lang);
              }
            });
          });
        }
      ]
    };
  </script>

  <!-- Docsify Core -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>

  <!-- Docsify Plugins -->
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-sidebar-collapse@1.3.5/dist/docsify-sidebar-collapse.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-copy-code@2/dist/docsify-copy-code.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-pagination@2/dist/docsify-pagination.min.js"></script>

  <!-- Mermaid + Docsify integration -->
  <script src="//cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
  <script>
    // Initialize Mermaid with dark theme
    mermaid.initialize({
      startOnLoad: false,
      theme: 'dark',
      themeVariables: {
        primaryColor: '#1a2035',
        primaryTextColor: '#f1f5f9',
        primaryBorderColor: '#FF6B35',
        lineColor: '#FF6B35',
        secondaryColor: '#111827',
        tertiaryColor: '#0a0e17',
        fontFamily: 'Inter, sans-serif'
      },
      flowchart: {
        useMaxWidth: true,
        htmlLabels: true,
        curve: 'basis',
        padding: 16
      },
      sequence: { useMaxWidth: true, showSequenceNumbers: true }
    });

    // Docsify hook — find lang-mermaid code blocks, replace with .mermaid divs, render
    function renderAllMermaid() {
      document.querySelectorAll('code.lang-mermaid').forEach(function(codeEl) {
        var pre = codeEl.closest('pre');
        if (!pre) return;
        if (pre.nextElementSibling && pre.nextElementSibling.classList.contains('mermaid-processed')) return;

        var code = codeEl.textContent.trim();
        if (!code) return;

        var div = document.createElement('div');
        div.className = 'mermaid';
        div.textContent = code;

        pre.parentNode.insertBefore(div, pre.nextSibling);
        pre.style.display = 'none';
      });

      document.querySelectorAll('.mermaid:not(.mermaid-processed)').forEach(function(el) {
        if (el.querySelector('svg')) return;
        try {
          mermaid.run({ nodes: [el] });
          el.classList.add('mermaid-processed');
        } catch(e) {
          console.warn('Mermaid render error:', e);
        }
      });
    }

    var mermaidTimeout;
    function scheduleMermaid() {
      clearTimeout(mermaidTimeout);
      mermaidTimeout = setTimeout(renderAllMermaid, 300);
    }

    document.addEventListener('DOMContentLoaded', function() {
      scheduleMermaid();
      var target = document.getElementById('main') || document.querySelector('.content');
      if (target) {
        var observer = new MutationObserver(function() { scheduleMermaid(); });
        observer.observe(target, { childList: true, subtree: true });
      }
    });
  </script>
</body>
</html>
